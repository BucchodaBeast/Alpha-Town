<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Town — Control</title>
<style>
  body { background: #040810; color: #8ba8c4; font-family: monospace; padding: 20px; margin: 0; }
  h1 { color: #00d4aa; font-size: 16px; letter-spacing: 0.2em; margin-bottom: 4px; }
  .sub { color: #334455; font-size: 11px; margin-bottom: 30px; }
  .btn {
    display: block; width: 100%; padding: 16px;
    margin-bottom: 12px; border: 1px solid #1a2a3a;
    background: #070f1a; color: #8ba8c4;
    font-family: monospace; font-size: 13px;
    border-radius: 4px; cursor: pointer; text-align: left;
    transition: all 0.2s;
  }
  .btn:hover, .btn:active { background: #0d1f30; border-color: #00d4aa; color: #00d4aa; }
  .btn .emoji { margin-right: 10px; }
  .btn .status { float: right; font-size: 11px; color: #334455; }
  .btn.running { border-color: #ffaa00; color: #ffaa00; }
  .btn.done { border-color: #00d4aa; color: #00d4aa; }
  .btn.error { border-color: #ff3333; color: #ff3333; }
  #log {
    margin-top: 24px; padding: 14px;
    background: #040810; border: 1px solid #1a2a3a;
    border-radius: 4px; font-size: 11px; color: #556688;
    min-height: 80px; max-height: 300px; overflow-y: auto;
  }
  .log-line { margin-bottom: 4px; }
  .log-line.ok { color: #00d4aa; }
  .log-line.err { color: #ff3333; }
  .log-line.info { color: #ffaa00; }
  #run-all {
    background: #0a1f10; border-color: #00d4aa;
    color: #00d4aa; font-size: 14px; font-weight: bold;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<h1>ALPHA TOWN // CONTROL</h1>
<div class="sub">Agent trigger interface — tap to fire</div>

<button class="btn" id="run-all" onclick="triggerAll()">
  ⚡ <span class="emoji"></span>RUN ALL AGENTS
  <span class="status" id="status-all">READY</span>
</button>

<button class="btn" onclick="trigger('KRON')">
  <span class="emoji">📡</span>KRON — News
  <span class="status" id="status-KRON">READY</span>
</button>
<button class="btn" onclick="trigger('PULSE')">
  <span class="emoji">💜</span>PULSE — Social
  <span class="status" id="status-PULSE">READY</span>
</button>
<button class="btn" onclick="trigger('MARCUS')">
  <span class="emoji">🏢</span>MARCUS — Markets
  <span class="status" id="status-MARCUS">READY</span>
</button>
<button class="btn" onclick="trigger('SCOUT')">
  <span class="emoji">💼</span>SCOUT — Opportunity
  <span class="status" id="status-SCOUT">READY</span>
</button>
<button class="btn" onclick="trigger('VEXA')">
  <span class="emoji">🏥</span>VEXA — Health
  <span class="status" id="status-VEXA">READY</span>
</button>
<button class="btn" onclick="trigger('SYNTHESIS')">
  <span class="emoji">🔬</span>SYNTHESIS — Science
  <span class="status" id="status-SYNTHESIS">READY</span>
</button>
<button class="btn" onclick="trigger('RAZOR')">
  <span class="emoji">🔴</span>RAZOR — Insider
  <span class="status" id="status-RAZOR">READY</span>
</button>
<button class="btn" onclick="trigger('WATT')">
  <span class="emoji">⚡</span>WATT — Energy
  <span class="status" id="status-WATT">READY</span>
</button>
<button class="btn" onclick="trigger('HULL')">
  <span class="emoji">⚓</span>HULL — Shipping
  <span class="status" id="status-HULL">READY</span>
</button>
<button class="btn" onclick="trigger('STATUTE')">
  <span class="emoji">⚖️</span>STATUTE — Regulation
  <span class="status" id="status-STATUTE">READY</span>
</button>
<button class="btn" onclick="trigger('PARCEL')">
  <span class="emoji">🏛️</span>PARCEL — Real Estate
  <span class="status" id="status-PARCEL">READY</span>
</button>
<button class="btn" onclick="trigger('GAIA')">
  <span class="emoji">🌍</span>GAIA — Climate
  <span class="status" id="status-GAIA">READY</span>
</button>
<button class="btn" onclick="trigger('ODDS')">
  <span class="emoji">🎰</span>ODDS — Predictions
  <span class="status" id="status-ODDS">READY</span>
</button>
<button class="btn" onclick="trigger('CIPHER')">
  <span class="emoji">🏴</span>CIPHER — Geopolitics
  <span class="status" id="status-CIPHER">READY</span>
</button>
<button class="btn" onclick="trigger('ORACLE')" style="border-color:#aa44ff;color:#aa44ff">
  <span class="emoji">🔮</span>ORACLE — Synthesis
  <span class="status" id="status-ORACLE">READY</span>
</button>

<div id="log"><div class="log-line">// Waiting for commands...</div></div>

<script>
const BASE = window.location.origin;

function log(msg, type) {
  type = type || 'info';
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = 'log-line ' + type;
  const t = new Date().toISOString().split('T')[1].split('.')[0];
  line.textContent = '[' + t + '] ' + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function setStatus(agent, text, cls) {
  const el = document.getElementById('status-' + agent);
  if (!el) return;
  el.textContent = text;
  const btn = el.closest('.btn');
  if (btn) {
    btn.className = 'btn ' + (cls || '');
  }
}

async function trigger(agent) {
  setStatus(agent, 'RUNNING...', 'running');
  log('Triggering ' + agent + '...', 'info');
  try {
    const resp = await fetch(BASE + '/api/trigger/' + agent, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' }
    });
    const data = await resp.json();
    if (resp.ok) {
      const count = data.items_processed || data.items || 0;
      setStatus(agent, 'DONE (' + count + ')', 'done');
      log(agent + ' complete — ' + count + ' items', 'ok');
    } else {
      setStatus(agent, 'ERROR', 'error');
      log(agent + ' error: ' + JSON.stringify(data), 'err');
    }
  } catch(e) {
    setStatus(agent, 'FAILED', 'error');
    log(agent + ' failed: ' + e.message, 'err');
  }
}

async function triggerAll() {
  const agents = ['KRON','PULSE','MARCUS','SCOUT','VEXA','SYNTHESIS',
                  'RAZOR','WATT','HULL','STATUTE','PARCEL','GAIA','ODDS','CIPHER'];
  setStatus('all', 'RUNNING...', 'running');
  log('Running all agents sequentially...', 'info');

  for (const agent of agents) {
    await trigger(agent);
    await new Promise(r => setTimeout(r, 2000)); // 2s gap between agents
  }

  log('All field agents done. Triggering ORACLE synthesis...', 'info');
  await trigger('ORACLE');
  setStatus('all', 'COMPLETE', 'done');
  log('All done. Refresh the main app to see signals.', 'ok');
}
</script>
</body>
</html>
